name: OCI Cloud Sniper

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, openssl

      - name: Install dependencies
        run: composer install --no-interaction --optimize-autoloader

      - name: Create Private Key File
        run: |
          cat << 'EOF' > ./oci_api_key.pem
          ${{ secrets.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 ./oci_api_key.pem

      - name: Execute Sniper
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_PRIVATE_KEY_FILENAME: ./oci_api_key.pem
          OCI_SHAPE: 'VM.Standard.A1.Flex'
          OCI_OCPUS: '4'
          OCI_MEMORY_IN_GBS: '24'
        run: php index.php
